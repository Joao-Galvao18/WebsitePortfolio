    <header class="page-head gallery-head">

        <h1 class="page-title" data-i18n="gallery.title">Gallery</h1>
      </div>

      <div class="view-toggle" data-view="canvas" role="group" aria-label="Switch gallery view">
        <span class="toggle-pill" aria-hidden="true"></span>
        <button class="toggle-btn" data-view="canvas" aria-pressed="true" data-i18n="gallery.canvas">Canvas</button>
        <button class="toggle-btn" data-view="grid" aria-pressed="false" data-i18n="gallery.grid">Grid</button>
      </div>

    <div class="gallery-views">
      <!-- Infinite canvas -->
      <div class="gallery-view canvas-view" data-cursor="drag" aria-label="Infinite image canvas — drag in any direction">
        <p class="canvas-hint" data-i18n="gallery.hint">Drag anywhere — it never ends</p>

      </div>

      <!-- Calendar grid -->
      <div class="gallery-view grid-view" hidden>
        <!-- month sections rendered from data/projects.js -->
      </div>
    </div>
